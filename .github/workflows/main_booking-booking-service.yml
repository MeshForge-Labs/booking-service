# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - booking-booking-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: mybookingacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03158F7E27B5422FB841F292BC9CD5A6 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_CB4A529B14EA45C7BB418D7697423C42 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03158F7E27B5422FB841F292BC9CD5A6 }}/booking-service:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1FFE333960B141DD9F094E6B568802E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_28565D7BCE2C42CDA4E3648CE6501CCC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FA2E66C448CB4E3BBBD82DE31F572018 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'booking-booking-service'
          slot-name: 'Production'
          images: 'mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_03158F7E27B5422FB841F292BC9CD5A6 }}/booking-service:${{ github.sha }}'
          