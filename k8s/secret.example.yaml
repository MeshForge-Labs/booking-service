# Example Secret. Do NOT commit real values.
# Service URLs are internal (K8s DNS): http://<service-name>.<namespace>.svc.cluster.local
apiVersion: v1
kind: Secret
metadata:
  name: booking-service-secret
  labels:
    app: booking-service
type: Opaque
stringData:
  DATABASE_URL: "postgresql://booking_user:CHANGE_ME@postgres:5432/booking_db"
  AUTH_SERVICE_URL: "http://auth-service:80"
  EVENT_SERVICE_URL: "http://event-service:80"
  NOTIFICATION_SERVICE_URL: "http://notification-service:80"
  LOG_LEVEL: "info"
  NODE_ENV: "production"
